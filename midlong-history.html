<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중장기 프로젝트 이력</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#EEF7FB;
    --card:#FFFFFF;
    --ink:#3D5266;
    --muted:#8FA6B3;
    --line:#DCEEF5;
    --lavender:#BFE3F5;
    --lavender-deep:#5FA8D3;
    --mint:#C9EAD1;
    --mint-deep:#5FAE74;
    --peach:#FFD9A8;
    --peach-deep:#E8973D;
    --coral:#FF8B7A;
    --radius:18px;
    --shadow: 0 6px 20px rgba(70, 120, 150, 0.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Pretendard', -apple-system, "Apple SD Gothic Neo", sans-serif;
    background:
      radial-gradient(circle at 8% 8%, #DCEEF9 0%, transparent 40%),
      radial-gradient(circle at 95% 15%, #FFF3E5 0%, transparent 35%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:24px;
  }
  .wrap{ max-width:720px; margin:0 auto; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .topbar h1{ font-size:22px; font-weight:800; margin:0; letter-spacing:-0.5px; }
  .back-link{ font-size:12.5px; color:var(--muted); text-decoration:none; font-weight:700; }
  .back-link:hover{ color:var(--lavender-deep); }
  .search-box{
    width:100%; border:1px solid var(--line); border-radius:12px; padding:11px 14px;
    font-size:14px; font-family:inherit; box-sizing:border-box; margin-bottom:18px;
    background:var(--card); box-shadow:var(--shadow);
  }
  .project-card{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    border:1px solid var(--line); margin-bottom:10px; overflow:hidden;
  }
  .project-row{ display:flex; align-items:center; gap:10px; padding:14px 16px; }
  .project-row input[type=checkbox]{ width:17px; height:17px; accent-color:var(--peach-deep); cursor:pointer; flex-shrink:0; }
  .priority-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; flex-shrink:0; }
  .project-main{ flex:1; min-width:0; cursor:pointer; }
  .project-title{ font-weight:800; font-size:14px; }
  .project-title.done{ color:#3B7DE8; }
  .project-dates{ font-size:11px; color:var(--muted); margin-top:2px; }
  .midlong-progress-wrap{ margin-top:5px; }
  .midlong-progress-bar{ height:6px; border-radius:999px; background:#EFEFF7; overflow:hidden; }
  .midlong-progress-fill{
    height:100%; border-radius:999px;
    background:linear-gradient(90deg, var(--mint-deep), var(--mint));
  }
  .midlong-progress-fill.overdue{ background:linear-gradient(90deg, var(--coral), #FFC2CE); }
  .project-meta.overdue{ color:var(--coral); font-weight:800; }
  .project-meta.done{ color:#3B7DE8; font-weight:800; }
  .project-meta{ font-size:10.5px; color:var(--muted); white-space:nowrap; }
  .project-toggle{
    border:none; background:#FFF3E5; color:var(--peach-deep); font-size:11px; font-weight:800;
    border-radius:999px; padding:4px 9px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  .subtasks{ padding:0 16px 14px 44px; }
  .subtask-row{
    font-size:12.5px; color:var(--ink); display:flex; align-items:center; gap:7px; padding:4px 0;
  }
  .subtask-row.done{ color:var(--muted); text-decoration:line-through; }
  .subtask-row .sub-dot{ width:6px; height:6px; border-radius:50%; background:var(--lavender-deep); flex-shrink:0; }
  .memo-mark{ font-size:11px; }
  .empty{
    font-size:13px; color:var(--muted); padding:24px; text-align:center;
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  }
  /* 상세 편집 모달 */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(224,152,63,0.2);
    backdrop-filter:blur(2px); z-index:100; align-items:center; justify-content:center; padding:20px;
  }
  .modal-panel{
    background: radial-gradient(circle at 100% 0%, #FFF3E5 0%, transparent 45%), #fff;
    border-radius:20px; box-shadow:0 20px 50px rgba(85,90,150,0.25);
    border:1px solid var(--line);
    width:100%; max-width:420px; padding:22px; max-height:88vh; overflow-y:auto; position:relative;
  }
  .modal-panel h3{ margin:0 0 16px; font-size:16px; font-weight:800; display:flex; align-items:center; gap:7px; }
  .modal-panel h3::before{ content:''; width:9px; height:9px; border-radius:50%; background:var(--peach-deep); display:inline-block; }
  .modal-field{ margin-bottom:14px; }
  .modal-field-row{ display:flex; gap:10px; }
  .modal-field-row .modal-field{ flex:1; min-width:0; }
  .modal-field label{ display:block; font-size:11.5px; font-weight:800; color:var(--muted); margin-bottom:5px; }
  .modal-field input[type=text], .modal-field input[type=url], .modal-field input[type=date],
  .modal-field textarea, .modal-field select{
    width:100%; border:1px solid var(--line); background:#F7FCFE; border-radius:10px; padding:9px 10px;
    font-size:13px; font-family:inherit; box-sizing:border-box; color:var(--ink);
    transition:border-color 0.15s, box-shadow 0.15s;
  }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus{
    outline:none; border-color:var(--peach-deep); box-shadow:0 0 0 3px rgba(224,152,63,0.18); background:#fff;
  }
  .modal-field textarea{ resize:vertical; min-height:70px; }
  .modal-link-preview{ margin-top:6px; font-size:12px; word-break:break-all; }
  .modal-link-preview a{ color:var(--lavender-deep); font-weight:700; text-decoration:none; }
  .modal-link-preview a:hover{ text-decoration:underline; }
  .modal-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:18px; gap:8px; }
  .modal-actions .left{ display:flex; gap:8px; }
  .modal-btn{ border:none; border-radius:10px; padding:9px 16px; font-size:13px; font-weight:800; cursor:pointer; }
  .modal-btn.save{ background:var(--peach); color:#7A4A0F; }
  .modal-btn.cancel{ background:#EAF5FA; color:var(--muted); }
  .modal-btn.delete{ background:#FFEFF2; color:var(--coral); }
  .modal-close-x{
    position:absolute; top:16px; right:16px; border:none; background:transparent;
    font-size:16px; color:var(--muted); cursor:pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>📌 중장기 프로젝트 이력</h1>
    <a href="#" class="back-link" id="backLink">← 플래너로 돌아가기</a>
  </div>
  <input type="text" class="search-box" id="searchInput" placeholder="과제 이름으로 검색">
  <div id="listWrap"></div>
</div>

<div class="modal-overlay" id="midLongModalOverlay">
  <div class="modal-panel">
    <button class="modal-close-x" id="midLongModalClose" aria-label="닫기">✕</button>
    <h3>중장기 과제 상세</h3>
    <div class="modal-field">
      <label>과제 제목</label>
      <input type="text" id="midLongModalTitleInput">
    </div>
    <div class="modal-field-row">
      <div class="modal-field">
        <label>중요도</label>
        <select id="midLongModalPriority">
          <option value="high">🔴 높음</option>
          <option value="medium">🟣 보통</option>
          <option value="low">🟢 낮음</option>
        </select>
      </div>
    </div>
    <div class="modal-field-row">
      <div class="modal-field">
        <label>시작일</label>
        <input type="date" id="midLongModalStart">
      </div>
      <div class="modal-field">
        <label>완료목표일</label>
        <input type="date" id="midLongModalDue">
      </div>
    </div>
    <div class="modal-field">
      <label>메모</label>
      <textarea id="midLongModalMemo" placeholder="과제 관련 메모를 남겨보세요"></textarea>
    </div>
    <div class="modal-field">
      <label>관련 링크 (컨플루언스, 문서함 등)</label>
      <input type="url" id="midLongModalLink" placeholder="https://...">
      <div class="modal-link-preview" id="midLongModalLinkPreview"></div>
    </div>
    <div class="modal-actions">
      <div class="left">
        <button class="modal-btn cancel" id="midLongModalCancel">취소</button>
        <button class="modal-btn delete" id="midLongModalDelete">삭제</button>
      </div>
      <button class="modal-btn save" id="midLongModalSave">저장</button>
    </div>
  </div>
</div>

<!-- 하부 업무(일반 업무) 상세 편집 모달 -->
<div class="modal-overlay" id="taskModalOverlay">
  <div class="modal-panel">
    <button class="modal-close-x" id="taskModalClose" aria-label="닫기">✕</button>
    <h3>업무 상세</h3>
    <div class="modal-field">
      <label>업무 제목</label>
      <input type="text" id="taskModalTitleInput">
    </div>
    <div class="modal-field">
      <label>중장기 과제 연결 (선택)</label>
      <select id="taskModalMidLong"></select>
    </div>
    <div class="modal-field-row">
      <div class="modal-field">
        <label>중요도</label>
        <select id="taskModalPriority">
          <option value="high">🔴 높음</option>
          <option value="medium">🟣 보통</option>
          <option value="low">🟢 낮음</option>
        </select>
      </div>
      <div class="modal-field">
        <label>완료목표일 (선택)</label>
        <input type="date" id="taskModalDueDate">
      </div>
    </div>
    <div class="modal-field">
      <label>메모</label>
      <textarea id="taskModalMemo" placeholder="업무 관련 메모를 남겨보세요"></textarea>
    </div>
    <div class="modal-field">
      <label>관련 링크 (컨플루언스, 문서함, 첨부파일 링크 등)</label>
      <input type="url" id="taskModalLink" placeholder="https://...">
      <div class="modal-link-preview" id="taskModalLinkPreview"></div>
    </div>
    <div class="modal-actions">
      <div class="left">
        <button class="modal-btn cancel" id="taskModalCancel">취소</button>
        <button class="modal-btn delete" id="taskModalDelete">삭제</button>
      </div>
      <button class="modal-btn save" id="taskModalSave">저장</button>
    </div>
  </div>
</div>

<script src="midlong-history.js"></script>
</body>
</html>
